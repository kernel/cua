schema_version = "1.0"

[task]
name = "osunlp/{task_id}"
authors = [{ name = "OSU NLP Group" }]
keywords = ["online-mind2web", "web-agent", "live-web"]

[metadata]
difficulty = "hard"
category = "web-navigation"
source = "osunlp/Online-Mind2Web"
reference_length = "{reference_length}"

[agent]
timeout_sec = 1800.0

[verifier]
timeout_sec = 900.0

[verifier.env]
# WebJudge backbone. The judge bin parses the provider from JUDGE_MODEL and
# reads the matching provider key; anthropic is the wired provider.
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"
JUDGE_MODEL = "anthropic:claude-opus-4-8"
SCORE_THRESHOLD = "3"

[environment]
build_timeout_sec = 300.0
