schema_version = "1.0"

[task]
name = "webvoyager/webvoyager__{task_id}"
authors = [{ name = "MinorJerry" }]
keywords = ["webvoyager", "web-agent", "{web_name_slug}"]

[metadata]
difficulty = "medium"
category = "web-navigation"
source = "MinorJerry/WebVoyager"
web_name = "{web_name}"
start_url = "{start_url}"
reference_answer = "{reference_answer}"
reference_type = "{reference_type}"

[verifier]
timeout_sec = 600.0

[verifier.env]
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"
OPENAI_API_KEY = "${OPENAI_API_KEY}"
JUDGE_MODEL = "${WEBVOYAGER_JUDGE_MODEL:-claude-sonnet-4-5}"
MAX_IMAGES = "${WEBVOYAGER_MAX_IMAGES:-15}"

[agent]
timeout_sec = 1800.0

[environment]
build_timeout_sec = 300.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
